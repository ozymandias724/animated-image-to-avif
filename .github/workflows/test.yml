name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Download repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Install project dependencies
      - name: Install dependencies
        run: bun install

      # Runtime scratch space used
      # by integration conversion tests
      #
      # fixtures/ is tracked in git
      # tmp/ is intentionally ephemeral
      - name: Create tmp directory
        run: mkdir -p tmp

      # Install avifenc (Ubuntu)
      - name: Install libavif (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavif-bin

      # Install avifenc (macOS)
      - name: Install libavif (macOS)
        if: runner.os == 'macOS'
        run: brew install libavif

      # Install avifenc (Windows)
      #
      # Windows support is currently
      # experimental/validation-stage
      # Install avifenc (Windows)
      - name: Install libavif (Windows)
        if: runner.os == 'Windows'
        run: |
          # Download and install libavif from GitHub releases
          curl -L -o libavif.zip https://github.com/AOMediaCodec/libavif/releases/download/v1.0.0/libavif-windows.zip
          Expand-Archive -Path libavif.zip -DestinationPath C:\libavif
          Add-Content -Path $env:GITHUB_PATH -Value "C:\libavif\bin"
